<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rust</title>
  <style>
    /* Full-screen background */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: url('backgroundRust.jpg') no-repeat center center/cover;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }

    /* Main heading */
    h1 {
      font-size: 3rem;
      margin: 0.2em;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
    }

    /* Subtext / contact info */
    p {
      font-size: 1.5rem;
      max-width: 90%;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }

    /* Responsive adjustments for small screens */
    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
      p {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div>
    <h1>Coming Soon</h1>
    <a href="https://www.facebook.com/profile.php?id=61584413643713">Our Facebook page!</a>
  </div>
</body>
</html>
